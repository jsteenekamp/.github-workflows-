name: Car Finder Agent Autopilot

on:
  schedule:
    # ⏱️ Triggers at 7:03 AM and 7:03 PM Melbourne Time daily to avoid peak hour queue delays
    - cron: '3 7,19 * * *'
      timezone: 'Australia/Melbourne'
  
  # Allows you to manually click "Run workflow" from your Lenovo X5 whenever you want an instant check
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies & Python Packages
      run: |
        python -m pip install --upgrade pip
        pip install playwright
        # Install the automated system browsers needed for stealth scraping
        playwright install chromium --with-deps

    - name: Execute Car Finder Script
      env:
        # Securely maps your phone and credentials from GitHub Secrets
        TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
        TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      run: python car_finder_agent.py

    - name: Archive Spreadsheet Results
      uses: actions/upload-artifact@v4
      with:
        name: daily-car-listings
        path: car_hunt_results_*.csv
        retention-days: 7
